# ⚠️ CRITICAL FILE - DO NOT MODIFY WITHOUT EXPLICIT APPROVAL ⚠️
#
# Simplified release workflow — publishes to npm when package.json version
# differs from the published npm version.
#
# Version bumps are done LOCALLY before merging to main:
#   pnpm exec changeset version  (bumps package.json, updates CHANGELOG, deletes changesets)
#   git commit -m "chore: version packages"
#   merge to dev → main via PR
#
# This workflow then detects the version difference and publishes.
# OIDC publishing — NO npm tokens required.
#
# DO NOT ADD administration:write — it is a GitHub Apps permission, NOT a valid
# GITHUB_TOKEN workflow permission. GitHub rejects the entire workflow file instantly.
#
# Last updated: 2026-04-03

name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write  # Required for OIDC/Trusted Publishing

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js 24 (required for npm 11.5+ OIDC)
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
          # DO NOT set registry-url — conflicts with OIDC

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Check if version needs publishing
        id: check-publish
        run: |
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          NPM_VERSION=$(npm view @discourser/design-system version 2>/dev/null || echo "0.0.0")

          echo "Local version:  $LOCAL_VERSION"
          echo "npm version:    $NPM_VERSION"

          if [ "$LOCAL_VERSION" != "$NPM_VERSION" ]; then
            echo "should_publish=true" >> $GITHUB_OUTPUT
            echo "version=$LOCAL_VERSION" >> $GITHUB_OUTPUT
            echo "→ Will publish $LOCAL_VERSION"
          else
            echo "should_publish=false" >> $GITHUB_OUTPUT
            echo "→ Already published, skipping"
          fi

      - name: Publish to npm with OIDC
        if: steps.check-publish.outputs.should_publish == 'true'
        run: npm publish --provenance --access public

      - name: Create Git Tag
        if: steps.check-publish.outputs.should_publish == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          VERSION="${{ steps.check-publish.outputs.version }}"

          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists, skipping"
          else
            git tag -a "v$VERSION" -m "Release v$VERSION"
            git push origin "v$VERSION"
            echo "Created and pushed tag v$VERSION"
          fi

      - name: Summary
        if: steps.check-publish.outputs.should_publish == 'true'
        run: |
          echo "## 🚀 Published @discourser/design-system@${{ steps.check-publish.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "Published using npm Trusted Publishing (OIDC)" >> $GITHUB_STEP_SUMMARY
